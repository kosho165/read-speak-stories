<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Read & Speak Stories</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f8f9fa 0%, #e0d4f5 100%);
        }
        .splash-container { text-align: center; }
        .splash-container img { width: 250px; height: auto; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2)); margin-bottom: 20px; }
        .splash-container h1 { color: #553098; font-size: 32px; margin-bottom: 5px; }
        .splash-container p { color: #666; font-size: 18px; margin-bottom: 40px; }
        
        .go-btn {
            background: #6f42c1;
            color: white;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 60px;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(111, 66, 193, 0.4);
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .go-btn:hover { background: #553098; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="splash-container">
        <img src="/images/logo.png" alt="Read & Speak Stories Logo">
        <h1>Interactive Stories Academy</h1>
        <p>Listen, Read, and Speak Fluently</p>
        
        <!-- التعديل هنا: مسار مطلق بيبدأ بـ / -->
        <a href="/levels.html" class="go-btn">GO 🚀</a>
    </div>

</body>
</html>
