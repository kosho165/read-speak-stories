<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Read & Speak Stories</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #eaddf7 0%, #d4c1ee 100%);
        }
        
        .main-card {
            background: #ffffff;
            padding: 40px 40px 25px 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 85%;
            border: 1px solid #f3e8ff;
        }

        .main-card img { 
            width: 180px; 
            height: auto; 
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15)); 
            margin-bottom: 20px; 
            border-radius: 20px;
        }
        
        .main-card h1 { 
            color: #553098; 
            font-size: 26px; 
            margin-bottom: 8px; 
            margin-top: 0;
        }
        
        .main-card p.subtitle { 
            color: #666; 
            font-size: 15px; 
            margin-bottom: 25px; 
        }

        /* تصميم مربع الاسم الجديد */
        .name-input {
            width: 80%;
            padding: 12px 15px;
            margin-bottom: 25px;
            border: 2px solid #d4c1ee;
            border-radius: 10px;
            font-size: 16px;
            text-align: center;
            color: #553098;
            outline: none;
            transition: 0.3s;
            font-weight: bold;
        }

        .name-input:focus {
            border-color: #6f42c1;
            box-shadow: 0 0 8px rgba(111, 66, 193, 0.2);
        }
        
        .go-btn {
            background: #6f42c1;
            color: white;
            font-size: 22px;
            font-weight: bold;
            padding: 12px 50px;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(111, 66, 193, 0.3);
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
            cursor: pointer;
            border: none;
        }
        
        .go-btn:hover { 
            background: #553098; 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(111, 66, 193, 0.4);
        }

        .creator-text {
            color: #999;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 0.5px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <img src="images/logo.png" alt="Read & Speak Stories Logo" onerror="this.src='/images/logo.jpg'">
        
        <h1>Interactive Stories Academy</h1>
        <p class="subtitle">Listen, Read, and Speak Fluently</p>
        
        <!-- حقل إدخال الاسم -->
        <input type="text" id="studentNameInput" class="name-input" placeholder="Type your name here...">
        
        <!-- زرار الانطلاق المربوط بالبرمجة -->
        <button onclick="saveNameAndGo()" class="go-btn">GO 🚀</button>

        <div class="creator-text">
            Created by : Hisham Embaby
        </div>
    </div>

    <!-- برمجة حفظ الاسم في الذاكرة -->
    <script>
        // لو الطالب كان مسجل اسمه قبل كده، نكتبهوله جاهز
        window.onload = function() {
            const savedName = localStorage.getItem('studentName');
            if(savedName) {
                document.getElementById('studentNameInput').value = savedName;
            }
        };

        function saveNameAndGo() {
            const nameField = document.getElementById('studentNameInput').value.trim();
            if(nameField === "") {
                alert("Please enter your name first! / من فضلك اكتب اسمك أولاً");
                document.getElementById('studentNameInput').focus();
            } else {
                // حفظ الاسم في المتصفح باسم موحد لكل الفصول
                localStorage.setItem('studentName', nameField);
                // الانتقال لصفحة المستويات
                window.location.href = '/levels.html';
            }
        }
    </script>
</body>
</html>
