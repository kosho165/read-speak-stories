<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Levels | Read & Speak Stories</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #eaddf7 0%, #d4c1ee 100%);
        }
        
        .main-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 85%;
            border: 1px solid #f3e8ff;
        }

        .main-card img {
            width: 160px;
            height: auto;
            filter: drop-shadow(0 8px 12px rgba(0,0,0,0.15));
            margin-bottom: 20px;
            border-radius: 15px;
        }
        
        .main-card h1 {
            color: #553098;
            font-size: 26px;
            margin-bottom: 30px;
            margin-top: 0;
        }
        
        .levels-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 35px;
        }
        
        .level-btn {
            background: white;
            color: #6f42c1;
            font-size: 20px;
            font-weight: bold;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            border: 2px solid #6f42c1;
            transition: 0.3s;
            display: block;
        }
        
        .level-btn:hover {
            background: #6f42c1;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(111, 66, 193, 0.2);
        }

        .creator-text {
            color: #999;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 0.5px;
            border-top: 1px solid #eee;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <img src="/images/logo.png" alt="Read & Speak Stories Logo" onerror="this.src='/images/logo.jpg'">
        
        <h1 id="welcomeMessage">Choose Your Level</h1>
        
        <div class="levels-container">
            <a href="/levels/beginner/index.html" class="level-btn">Beginner</a>
            <a href="/levels/intermediate/stories.html" class="level-btn">Intermediate</a>
            <a href="/levels/advanced/index.html" class="level-btn">Advanced</a>
        </div>

        <div class="creator-text">
            Created by : Hisham Embaby
        </div>
    </div>

    <script>
        window.onload = function() {
            const savedName = localStorage.getItem('studentName');
            if(savedName) {
                document.getElementById('welcomeMessage').innerText = "Welcome, " + savedName + "!";
            }
        };
    </script>
</body>
</html>
