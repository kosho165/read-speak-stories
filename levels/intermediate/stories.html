<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate Stories | Read & Speak Stories</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; text-align: center; padding: 50px; margin: 0; }
        .stories-container { display: flex; gap: 30px; justify-content: center; margin-top: 40px; flex-wrap: wrap; }
        
        .story-card { background: white; padding: 25px; border-radius: 20px; width: 280px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 2px solid transparent; transition: 0.3s; display: flex; flex-direction: column; align-items: center;}
        .story-card:hover { transform: translateY(-8px); border-color: #6f42c1; box-shadow: 0 10px 25px rgba(111,66,193,0.15); }
        
        /* مكان لصورة غلاف القصة */
        .story-card img { width: 100%; border-radius: 12px; margin-bottom: 20px; height: 200px; object-fit: cover; background-color: #eee; border: 1px solid #ddd;}
        
        .story-card h3 { color: #553098; margin-top: 0; font-size: 24px; margin-bottom: 10px;}
        .btn { background: #6f42c1; color: white; padding: 12px 30px; border-radius: 50px; text-decoration: none; display: inline-block; margin-top: auto; font-weight: bold; font-size: 16px; transition: 0.2s; width: 80%;}
        .btn:hover { background: #553098; }
        
        .back-btn { margin-top: 50px; display: inline-block; color: #dc3545; text-decoration: none; font-weight: bold; font-size: 16px; padding: 12px 25px; border: 2px solid #dc3545; border-radius: 50px; transition: 0.2s; background: white;}
        .back-btn:hover { background: #dc3545; color: white; }
    </style>
</head>
<body>

    <img src="/images/logo.png" alt="Read & Speak Stories Logo" style="width: 150px; height: auto; margin-bottom: 20px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));" onerror="this.src='/images/logo.jpg'">
    <h1 style="color: #333; margin-top: 0;">Intermediate Stories 📚</h1>
    <p style="color: #666; font-size: 18px;">Choose a story to start learning:</p>

    <div class="stories-container">
        
        <div class="story-card">
            <img src="oliver-cover.jpg" alt="Oliver Twist Cover" onerror="this.src='https://via.placeholder.com/280x200?text=Oliver+Twist'">
            
            <h3>Oliver Twist</h3>
            <p style="color: #888; font-size: 15px; margin-bottom: 25px; line-height: 1.5;">Learn English with the classic story of Oliver Twist.</p>
            
            <a href="/levels/intermediate/chapters.html" class="btn">View Chapters</a>
        </div>

        <div class="story-card" style="opacity: 0.7;">
            <img src="new-story-cover.jpg" alt="New Story Cover" onerror="this.src='https://via.placeholder.com/280x200?text=Coming+Soon'">
            
            <h3 style="color: #888;">Coming Soon</h3>
            <p style="color: #aaa; font-size: 15px; margin-bottom: 25px; line-height: 1.5;">More exciting stories will be added here soon.</p>
            
            <a href="#" class="btn" style="background: #ccc; cursor: not-allowed;">Locked 🔒</a>
        </div>

    </div>

    <a href="/levels.html" class="back-btn">🔙 Back to Levels</a>

</body>
</html>
